services:
  reclaimerr:
    image: ghcr.io/jessielw/reclaimerr:latest
    container_name: reclaimerr
    restart: unless-stopped
    env_file: ".env"
    volumes:
      # persist app data
      - ./data:/app/data

      # bind mount for media files (adjust the host path as needed) - this is needed for 
      # Reclaimerr to clean up additional files on delete when deleting via the main media server
      # directly
      - /media:/media

      # optional volume for moved files (adjust the host path as needed)
      # - /moved_files:/moved_files
    ports:
      - "8000:8000"

    # optional healthcheck to monitor container health (adjust the URL and parameters as needed)
    # healthcheck:
    #   test: ["CMD", "curl", "-sf", "http://localhost:8000/api/info/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 20s
