name: Docs

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or ref to build"
        required: false
        default: "dev"
      deploy:
        description: "Deploy the build"
        required: false
        type: boolean
        default: false
  release:
    types: [published]

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_REF: ${{ github.event.inputs.branch || github.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DOCS_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv sync --extra docs --frozen

      - name: Build docs
        run: uv run zensical build --clean

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    needs: build
    runs-on: ubuntu-latest
    environment:
      # use a dedicated Pages environment so release tags, including betas,
      # are not blocked by the protected github-pages environment rules.
      name: docs-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
